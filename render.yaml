services:
  - type: web
    name: forevo
    runtime: node
    buildCommand: npm install && cd server && npm install && cd ../client && npm install && npx vite build
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: forevo-db
          property: connectionString
  - type: pgsql
    name: forevo-db
    plan: free
